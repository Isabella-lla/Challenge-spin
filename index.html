<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spin Topics</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400;0,6..96,600;1,6..96,400&family=Tenor+Sans&display=swap" rel="stylesheet">
</head>
<body>

    <div class="dashboard-fullscreen">
        <div class="main-stage">
            <p class="motto-text">Hello, Genius!.</p>
            <h1 class="main-title">1-MINUTE RANDOM TOPIC</h1>

            <div class="display-window">
                <div class="scroll-engine" id="topic-container">
                    <div class="topic-row">READY TO FOCUS</div>
                </div>
            </div>

            <div class="action-area">
                <button id="spin-btn" class="btn-primary" onclick="spinTopic()">SPIN TOPIC</button>
                <button id="timer-btn" class="btn-secondary" onclick="toggleTimer()" disabled>START TIMER</button>
            </div>

            <div class="timer-countdown" id="timer">01:00</div>
        </div>

        <div class="control-stage">
            <div class="divider"></div>
            <div class="management-panel">
    <h2>Topic Configuration</h2>
    
    <div class="config-row">
        <div class="radio-options">
            <label class="radio-label">
                <input type="radio" name="topicMode" value="default" checked> By System
            </label>
            <label class="radio-label">
                <input type="radio" name="topicMode" value="custom"> Custom Input (Min. 5 Topics)
            </label>
        </div>
    </div>

    <div class="config-row">
        <div class="timer-setting-group">
            <label>Duration (Seconds):</label>
            <input type="number" id="duration-input" value="60" min="5">
        </div>
    </div>

    <div id="custom-input-section" class="config-row">
    <div class="field-group">
        <input type="text" id="custom-topic-field" placeholder="Type your custom topic here...">
        <button id="add-topic-btn" class="btn-add">ADD</button>
    </div>
    <ul id="custom-topics-list" class="custom-list"></ul>
</div>
</div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
